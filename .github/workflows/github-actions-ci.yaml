name: Continuous Integration

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "releases/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: Restore dependencies
        run: dotnet restore PosInformatique.Azure.Identity.AppRegistrationSecretWatcher.slnx

      - name: Build solution
        run: dotnet build PosInformatique.Azure.Identity.AppRegistrationSecretWatcher.slnx --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test \
          --solution PosInformatique.Azure.Identity.AppRegistrationSecretWatcher.slnx \
          --configuration Release \
          --no-build \
          --coverage \
          --coverage-output-format cobertura \
          --coverage-settings CodeCoverage.runsettings \
          --report-trx \
          --results-directory ./TestResults
  
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: |
            TestResults/**/*.trx